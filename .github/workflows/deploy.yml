name: Deploy to WordPress.org
on:
  push:
    tags:
    - "*"
jobs:
  build:
    # WordPress.org deploys run only from the public repo (SVN secrets live
    # there). In the private dev repo, tag pushes trigger sync-to-public.yml
    # instead, which mirrors the tag to the public repo and fires this there.
    if: github.repository == 'WPDevelopers/disable-comments'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Running Grunt Task Manager for POT Generation
        run: |
          npm install
          grunt i18n
      - name: WordPress Plugin Deploy
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}